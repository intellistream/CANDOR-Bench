data:
  dataset_name: sift
  max_elements: 200000
  begin_num: 50000
  data_type: float
  data_path: ./data/sift/sift_base.bin
  query_path: ./data/sift/sift_query.bin
  overall_gt_path: ./data/sift/sift_base_200k.gt20

index:
  index_type: hnsw
  m: 16
  ef_construction: 200

search:
  recall_at: 10
  ef_search: 35
  use_node_lock: true
  enable_search_sharing: false

workload:
  batch_size: 20
  num_threads: [8, 32]
  queue_size: 0
  rate_groups(r/w):
    - [20000, 20000]
    - [4000, 36000]
  with_external_rw_lock: false
  query_mode: round_robin

compare:
  enabled: false

result:
  output_dir: ./results/concurrent/round_robin_baseline_sift

profile:
  memory_monitor_interval: 100
  enable_memory_profile: true
