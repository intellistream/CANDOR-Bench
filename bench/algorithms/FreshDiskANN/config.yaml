random-xs:
  FreshDiskANN:
    module: benchmark_anns.bench.algorithms.FreshDiskANN.FreshDiskANN
    constructor: FreshDiskANN
    base-args: ["@metric"]
    run-groups:
      base:
        args: |
          [{"R": 32, "L": 50, "num_threads": 8, "insert_threads": 8, "search_threads": 8, "initial_search_complexity": 50, "verbose": true}]
        query-args: |
          [{"Ls": 50, "T": 8}]

