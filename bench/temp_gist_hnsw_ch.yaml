data:
  dataset_name: gist
  max_elements: -1
  begin_num: 50000
  data_type: float
  data_path: ../data/gist/gist_base.bin
  incr_query_path: ../data/gist/gist_query_stream.bin
  incr_gt_path: ../data/gist/gist_stream_i20_offset_index.txt
  overall_query_path: ../data/gist/gist_query.bin
  overall_gt_path: ../data/gist/gist_base.gt20

index:
  index_type: hnsw
  m: 24
  ef_construction: 500

search:
  recall_at: 10
  ef_search: 80
  with_node_lock: [true, false]

workload:
  batch_size: [20]
  num_threads: [8, 16, 32]
  queue_size: 0
  rate_groups(r/w):
    # - [5000, 5000]
    # - [10000, 10000]
    - [20000, 20000]

    # - [1000, 9000]
    # - [2000, 18000]
    - [4000, 36000]

    # - [9000, 1000]
    # - [18000, 2000]
    - [36000, 4000]
  with_external_rw_lock: false
  query_mode: chasing

compare:
  enabled: false
  simulate:
    enabled: false

result:
  output_dir: ./result/sigmod_full

profile:
  memory_monitor_interval: 100
  enable_memory_profile: true
