data:
  dataset_name: sift10m
  max_elements: 10000000
  begin_num: 500000
  data_type: float
  data_path: ../data/sift10m/sift10m_base.bin
  incr_query_path: ""
  overall_query_path: ../data/sift10m/sift10m_query.bin
  overall_gt_path: ../data/sift10m/sift10m_base.gt20

index:
  index_type: hnsw
  m: 16
  ef_construction: 200

search:
  recall_at: 10
  ef_search: 35
  use_node_lock: [true, false]

workload:
  batch_size: 100
  num_threads: [4, 8, 16, 32]
  queue_size: 0
  rate_groups(r/w):
    - [8000, 4000]
  with_external_rw_lock: false
  query_mode: round_robin

compare:
  enabled: false

result:
  output_dir: ./result/sift10m_scaling

profile:
  memory_monitor_interval: 100
  enable_memory_profile: false
